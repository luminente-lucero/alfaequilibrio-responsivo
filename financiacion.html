<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINENTE | Inversión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00F2FF; --bg: #030303; }
        body { background: var(--bg); color: #FFFFFF; font-family: 'JetBrains Mono', monospace; margin: 0; }
        .wireframe { position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(var(--accent) 1.5px, transparent 1.5px); background-size: 40px 40px; opacity: 0.15; }
        
        .finance-panel { 
            background: rgba(10, 10, 10, 0.95); 
            border: 1px solid rgba(0, 242, 255, 0.2); 
            clip-path: polygon(5% 0, 100% 0, 100% 85%, 95% 100%, 0 100%, 0 15%); 
            box-shadow: 0 0 50px rgba(0,242,255,0.05);
        }
        .btn-pay { 
            background: var(--accent); 
            color: #000; 
            font-weight: 900; 
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); 
            transition: 0.4s;
            box-shadow: 0 0 20px rgba(0,242,255,0.3);
        }
        .btn-pay:hover { background: #fff; transform: scale(1.05) skewX(-2deg); box-shadow: 0 0 40px var(--accent); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="p-8 md:px-16 flex justify-between items-center border-b border-cyan-500/10">
        <a href="index.html" class="font-['Orbitron'] font-black text-white text-xs tracking-[0.4em]">REGRESAR_//</a>
        <div class="text-[10px] font-bold text-cyan-500 tracking-widest uppercase opacity-60">Status: Secure_Link</div>
    </nav>

    <section class="flex-grow flex items-center justify-center px-8">
        <div class="finance-panel p-12 md:p-32 max-w-5xl w-full text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-50"></div>
            
            <h2 class="font-['Orbitron'] text-4xl md:text-8xl text-white mb-10 font-black uppercase tracking-tighter">CONTRATO</h2>
            <p class="text-cyan-500 text-xs mb-16 tracking-[0.5em] uppercase font-bold">Transferencia de activos para desarrollo Alpha</p>
            
            <div class="text-6xl md:text-[9rem] font-['Orbitron'] text-white mb-16 font-black tracking-tighter drop-shadow-lg">
                Ξ 0.40
            </div>
            
            <button class="btn-pay w-full max-w-md py-8 text-[12px] font-black uppercase tracking-[0.5em]">Firmar_Transacción</button>
            
            <p class="mt-16 text-[9px] text-white/20 uppercase tracking-[0.3em]">Luminente Neural Systems © 2026 // Distributed Network</p>
        </div>
    </section>
</body>
</html>
