<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFA-EQUILIBRIO | Documentación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00F2FF; --bg: #030303; --grid: rgba(0, 242, 255, 0.15); }
        body { background: var(--bg); color: #FFFFFF; font-family: 'JetBrains Mono', monospace; margin: 0; overflow-x: hidden; }
        
        /* Estética Wireframe de Index */
        .wireframe { position: fixed; inset: 0; z-index: -3; background-image: radial-gradient(circle at 1px 1px, var(--accent) 1px, transparent 0), linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.5; }
        .moving-grid { position: fixed; bottom: -20%; left: -50%; width: 200%; height: 100%; background-image: linear-gradient(var(--grid) 2px, transparent 2px), linear-gradient(90deg, var(--grid) 2px, transparent 2px); background-size: 100px 100px; transform: perspective(500px) rotateX(60deg); z-index: -2; mask-image: linear-gradient(to top, black, transparent); animation: moveGrid 20s linear infinite; }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 100px; } }

        /* Navegación Responsiva Unificada */
        #menu-toggle { display: none; }
        .nav-link { color: #888; transition: 0.3s; position: relative; letter-spacing: 0.2em; }
        .nav-link:hover { color: var(--accent); text-shadow: 0 0 8px var(--accent); }
        .nav-active { color: var(--accent); text-shadow: 0 0 15px var(--accent); font-weight: 700; }
        .nav-active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        @media (max-width: 768px) {
            #menu { display: none; flex-direction: column; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(3, 3, 3, 0.95); backdrop-filter: blur(30px); padding: 120px 40px; gap: 40px; z-index: 100; text-align: left; border-right: 2px solid var(--accent); }
            #menu-toggle:checked ~ #menu { display: flex; animation: slideIn 0.3s ease-out; }
            @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        }

        .ham-icon { width: 30px; height: 22px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 110; position: relative; }
        .ham-icon span { display: block; height: 3px; width: 100%; background: var(--accent); box-shadow: 0 0 8px var(--accent); transition: 0.3s; }
        #menu-toggle:checked ~ .ham-icon span:nth-child(1) { transform: rotate(45deg) translate(7px, 7px); }
        #menu-toggle:checked ~ .ham-icon span:nth-child(2) { opacity: 0; }
        #menu-toggle:checked ~ .ham-icon span:nth-child(3) { transform: rotate(-45deg) translate(6px, -7px); }

        .tech-card { background: rgba(10,10,10,0.95); border: 1px solid rgba(0,242,255,0.15); clip-path: polygon(0 0, 90% 0, 100% 15%, 100% 100%, 10% 100%, 0 85%); transition: 0.4s; position: relative; }
        .tech-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,242,255,0.1); transform: translateY(-10px); }
    </style>
</head>
<body>
    <div class="wireframe"></div>
    <div class="moving-grid"></div>

    <nav class="fixed w-full p-6 md:px-16 z-50 bg-black/40 backdrop-blur-xl border-b border-cyan-500/10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 bg-cyan-500 rounded-full shadow-[0_0_12px_#00F2FF]"></div>
                <span class="font-['Orbitron'] font-black text-white text-xs md:text-sm tracking-[0.5em]">ALFA_EQUILIBRIO</span>
            </div>
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="md:hidden ham-icon"><span></span><span></span><span></span></label>
            <div id="menu" class="md:flex md:space-x-16 text-[11px] font-bold uppercase tracking-[0.3em]">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="documentacion.html" class="nav-active">Documentación</a>
                <a href="financiacion.html" class="nav-link">Financiación</a>
            </div>
        </div>
    </nav>

    <section class="pt-44 pb-32 px-10 md:px-32 max-w-7xl mx-auto relative z-10">
        <div class="mb-20">
            <h2 class="font-['Orbitron'] text-5xl md:text-8xl text-white font-black uppercase tracking-tighter">TECNOLOGÍA</h2>
            <div class="h-1 w-40 bg-cyan-500 mt-4 shadow-[0_0_15px_var(--accent)]"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            <div class="tech-card p-12">
                <span class="text-cyan-800 font-bold block mb-4">0x001</span>
                <h4 class="text-white font-black mb-6 uppercase text-sm tracking-widest">Biocaptura 40Hz</h4>
                <p class="text-white/60 text-sm leading-relaxed font-light">Sensores PEDOT:PSS integrados para monitoreo de ondas Gamma corticales.</p>
            </div>
            <div class="tech-card p-12">
                <span class="text-cyan-800 font-bold block mb-4">0x002</span>
                <h4 class="text-white font-black mb-6 uppercase text-sm tracking-widest">Sinc. Ósea</h4>
                <p class="text-white/60 text-sm leading-relaxed font-light">Transducción piezoeléctrica de alta fidelidad sin comprometer la percepción ambiental.</p>
            </div>
            <div class="tech-card p-12 border-dashed border-cyan-900 bg-transparent flex flex-col justify-center">
                <button class="bg-cyan-500 text-black py-4 font-black uppercase text-[10px] tracking-widest hover:bg-white transition">FINANCIAR</button>
            </div>
        </div>
    </section>
</body>
</html>
